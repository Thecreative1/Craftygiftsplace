<section class="hero hero-home" id="hero-home" data-home-section="hero-home">
  <div class="container hero-home-shell">
    <div class="hero-copy">
      <div class="eyebrow rating-badge">{{eyebrow}}</div>
      <h1>{{h1}}</h1>
      <p>{{intro}}</p>
      <p class="hero-support">{{heroSupport}}</p>
      <div class="hero-actions">
        <a class="btn" href="{{etsyHref}}" target="_blank" rel="noopener">{{etsyLabel}}</a>
        <a class="btn-secondary" href="{{discoveryHref}}"{{discoveryAttrs}}>{{discoveryLabel}}</a>
      </div>
      <div class="hero-facts" aria-label="{{factsAriaLabel}}">
        {{heroFacts}}
      </div>
    </div>
    <div class="hero-collage" aria-label="{{collageAria}}">
      {{heroProductTiles}}
    </div>
  </div>
</section>

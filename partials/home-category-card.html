<article class="home-category-card" data-home-featured-category="true">
  <a class="home-category-link" href="{{href}}">
    <div class="home-category-copy">
      <span class="home-category-kicker">{{kicker}}</span>
      <h3>{{title}}</h3>
      <p>{{description}}</p>
    </div>
    <img src="{{image}}" alt="{{alt}}" width="600" height="600" loading="lazy" decoding="async" />
  </a>
</article>
